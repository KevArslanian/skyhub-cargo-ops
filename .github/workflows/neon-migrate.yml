name: Neon Prisma Migrations

on:
  workflow_dispatch:

concurrency:
  group: neon-migrate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview-migrate:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: ${{ secrets.NEON_PREVIEW_DATABASE_URL }}
      DATABASE_URL_UNPOOLED: ${{ secrets.NEON_PREVIEW_DATABASE_URL_UNPOOLED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run preview migrations
        run: pnpm db:migrate:unpooled

  production-migrate:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: ${{ secrets.NEON_PRODUCTION_DATABASE_URL }}
      DATABASE_URL_UNPOOLED: ${{ secrets.NEON_PRODUCTION_DATABASE_URL_UNPOOLED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production migrations
        run: pnpm db:migrate:unpooled
