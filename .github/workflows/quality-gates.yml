name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://skyhub:skyhub@localhost:5432/skyhub_ci?schema=public
      DATABASE_URL_UNPOOLED: postgresql://skyhub:skyhub@localhost:5432/skyhub_ci?schema=public
      SESSION_SECRET: ci-session-secret-ci-session-secret-ci-session-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: skyhub_ci
          POSTGRES_PASSWORD: skyhub
          POSTGRES_USER: skyhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skyhub -d skyhub_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run build
        run: pnpm build

      - name: Prepare QA database
        run: |
          pnpm db:migrate
          pnpm db:seed

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run regression and visual QA
        env:
          APP_BASE_URL: http://localhost:3000
        run: |
          pnpm start > /tmp/skyhub-next.log 2>&1 &
          app_pid=$!
          trap 'kill "$app_pid" || true' EXIT

          for attempt in {1..60}; do
            if curl -fsS "$APP_BASE_URL/about-us" >/dev/null; then
              pnpm qa:regression
              pnpm qa:visual
              exit 0
            fi

            if ! kill -0 "$app_pid" 2>/dev/null; then
              cat /tmp/skyhub-next.log
              exit 1
            fi

            sleep 2
          done

          cat /tmp/skyhub-next.log
          exit 1

      - name: Upload visual QA artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-qa-output
          path: output/visual-qa
          if-no-files-found: ignore
